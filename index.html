<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAuth Knowledge Graph</title>
  <meta name="description" content="Interactive knowledge graph of the AAuth (Agent Authorization) protocol">

  <!-- Cytoscape.js — graph engine -->
  <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>

  <!-- Theme -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>


  <div id="app">

    <!-- Header (unchanged) -->
    <header id="header">
      <div class="brand">
        <div class="brand-logo">A<span>²</span>Auth</div>
        <div class="brand-sub">Knowledge Graph |</div>
        <div class="header-brand">

  <a href="https://github.com/mcp-shark/aauth-explorer" target="_blank" rel="noopener" class="header-gh" title="View on GitHub">
    <svg height="20" width="20" viewBox="0 0 16 16" fill="#fff">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
  </a>
</div>

      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="view-toggle">
          <span class="toggle-label" id="view-label">INTERACTIVE</span>
          <div class="toggle-switch" id="view-toggle" title="Toggle Interactive / Full view"></div>
        </div>
        <div class="step-controls hidden">
          <button class="step-btn" id="step-prev" title="Previous step (←)" disabled>‹</button>
          <span class="step-indicator" id="step-indicator">0 / 0</span>
          <button class="step-btn" id="step-next" title="Next step (→)">›</button>
        </div>
        <a href="https://explorer.aauth.dev/" target="_blank" rel="noopener"
          style="font-size:12px;color:var(--text-muted);text-decoration:none;">Explorer ↗</a>
        <a href="https://www.aauth.dev/" target="_blank" rel="noopener"
          style="font-size:12px;color:var(--text-muted);text-decoration:none;">Spec ↗</a>
      </div>
    </header>

    <!-- Main: Left Nav + Graph + Right Sidebar -->
    <div id="main">

      <!-- Left Nav -->
      <nav id="left-nav">
        <div class="nav-section">
          <button class="layer-btn" data-layer="signing">
            <span class="icon">🔑</span> <span class="nav-label">Signing</span>
          </button>
          <div class="sublayer-group" data-layer="signing">
            <button class="sublayer-btn" data-sublayer="signing">All Schemes</button>
          </div>
        </div>

        <div class="nav-section">
          <button class="layer-btn" data-layer="access">
            <span class="icon">🔓</span> <span class="nav-label">Access</span>
          </button>
          <div class="sublayer-group" data-layer="access">
            <button class="sublayer-btn" data-sublayer="access-identity">Identity-Based</button>
            <button class="sublayer-btn" data-sublayer="access-resource">Resource-Managed</button>
            <button class="sublayer-btn" data-sublayer="access-ps">PS-Managed</button>
            <button class="sublayer-btn" data-sublayer="access-federated">Federated</button>
            <button class="sublayer-btn" data-sublayer="access-delegation">User Delegation</button>
          </div>
        </div>

        <div class="nav-section">
          <button class="layer-btn" data-layer="mission">
            <span class="icon">🎯</span> <span class="nav-label">Mission</span>
          </button>
          <div class="sublayer-group" data-layer="mission">
            <button class="sublayer-btn" data-sublayer="mission-lifecycle">Proposal & Approval</button>
            <button class="sublayer-btn" data-sublayer="mission-access">Resource Access</button>
            <button class="sublayer-btn" data-sublayer="mission-oob">Out-of-Bounds</button>
            <button class="sublayer-btn" data-sublayer="mission-completion">Completion</button>
            <button class="sublayer-btn" data-sublayer="mission-audit">Audit</button>
          </div>
        </div>

        <div class="nav-section">
          <button class="layer-btn" data-layer="advanced">
            <span class="icon">⚡</span> <span class="nav-label">Advanced</span>
          </button>
          <div class="sublayer-group" data-layer="advanced">
            <button class="sublayer-btn" data-sublayer="advanced-chain">Call Chaining</button>
            <button class="sublayer-btn" data-sublayer="advanced-clarification">Clarification Chat</button>
            <button class="sublayer-btn" data-sublayer="advanced-interaction">Interaction Chaining</button>
          </div>
        </div>
        <div class="nav-footer">
        <div class="nav-footer-label">Presented by</div>
        <a href="https://www.mcpshark.sh/" target="_blank" rel="noopener" class="nav-footer-brand">
  <img src="assets/images/logo.jpeg" alt="MCPShark" width="32" height="32"
       style="border-radius:6px;vertical-align:middle;margin-right:6px;">
  MCPShark
</a>

        <div class="nav-footer-links">
          <a href="https://github.com/mcp-shark/mcp-shark" target="_blank" rel="noopener">GitHub ↗</a>
          <a href="https://www.mcpshark.sh/" target="_blank" rel="noopener">Web ↗</a>
        </div>
      </div>
      </nav>
      


      <!-- Graph canvas -->
      <div id="cy"></div>

      <!-- Right sidebar (detail on click) -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Detail</span>
          <button class="sidebar-close" title="Close (Esc)">×</button>
        </div>
        <div class="sidebar-body">
          <div class="sidebar-section">
            <div class="sidebar-detail" style="color:var(--text-muted)">
              Click a node or edge to see protocol details.
            </div>
          </div>
        </div>
      </aside>

    </div>
  </div>

  <div class="graph-tooltip" id="tooltip"></div>

  <script src="data/graph.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/filters.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cy = GraphEngine.init('cy');
      Interactions.init(cy);
      Filters.init();
      Filters.initKeyboard();
    });
  </script>


</body>

</html>
